## BepInEx configuration — pre-seeded for Shadowrun Returns (Unity 4).
## The ONLY critical part is [Preloader.Entrypoint]: old Unity never fires the default entrypoint,
## so BepInEx must hook UnityEngine.dll's Camera .cctor or the game loads with no plugins.
## BepInEx fills in all other defaults on first run; do not remove this section.

[Preloader.Entrypoint]

## The local assembly to target.
# Setting type: String
Assembly = UnityEngine.dll

## The type in the entrypoint assembly to search for the entrypoint.
# Setting type: String
Type = Camera

## The method in the specified type to hook into.
# Setting type: String
Method = .cctor

[Logging.Console]

## Enables showing a console for log output.
# Setting type: Boolean
Enabled = false
