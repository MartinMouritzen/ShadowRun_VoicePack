<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SRR Voice Audition — Dead Man Switch</title>
<style>
  :root{
    --bg:#0d0f12; --panel:#14181d; --panel2:#1a2028; --edge:#242c36;
    --txt:#cfd8e3; --dim:#7c8794; --acc:#e8a33d; --acc2:#5ac8fa; --good:#68d391;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{background:var(--bg); color:var(--txt); font:15px/1.5 "Segoe UI",system-ui,sans-serif; height:100vh; display:flex; overflow:hidden}
  #side{width:320px; min-width:320px; border-right:1px solid var(--edge); overflow-y:auto; background:var(--panel)}
  #side h2{font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--dim); padding:14px 16px 6px}
  .char{display:flex; align-items:center; gap:10px; padding:7px 14px; cursor:pointer}
  .char:hover{background:rgba(255,255,255,.045)}
  .char.sel{background:linear-gradient(90deg, rgba(232,163,61,.22) 0%, var(--panel2) 34%, var(--panel2) 100%)}
  .char img,.char .ph{width:42px; height:42px; border-radius:6px; object-fit:cover; object-position:top; background:#232a33; flex:none;
    display:flex; align-items:center; justify-content:center; font-weight:700; color:#55606c; font-size:18px}
  .char .nm{font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .char .ct{font-size:12px; color:var(--dim)}
  .char .st{margin-left:auto; font-size:15px; color:var(--good)}
  #main{flex:1; overflow-y:auto; padding:26px 34px}
  #hdr{display:flex; gap:18px; align-items:center; margin-bottom:6px}
  #hdr img,#hdr .ph{width:86px; height:86px; border-radius:10px; object-fit:cover; object-position:top; background:#232a33;
    display:flex; align-items:center; justify-content:center; font-weight:700; color:#55606c; font-size:34px}
  #hdr h1{font-size:26px; letter-spacing:.01em}
  #hdr .meta{color:var(--dim); font-size:13px}
  .note{background:linear-gradient(90deg, rgba(232,163,61,.14) 0%, transparent 100%); border-radius:8px; padding:10px 14px; margin:14px 0; font-size:13.5px; color:#d8c9a8}
  .vtabs{display:flex; gap:8px; margin:18px 0 4px; flex-wrap:wrap}
  .vtab{padding:7px 14px; border:1px solid var(--edge); border-radius:20px; cursor:pointer; font-size:13.5px; color:var(--dim); background:var(--panel)}
  .vtab:hover{background:var(--panel2); color:var(--txt)}
  .vtab.sel{border-color:var(--acc); color:var(--acc); background:rgba(232,163,61,.08)}
  .vtab .pick{margin-left:6px}
  .vmeta{font-size:13px; color:var(--dim); margin:2px 0 10px}
  .pickbtn{margin:6px 0 14px; display:inline-flex; align-items:center; gap:8px; padding:7px 16px; border-radius:8px;
    border:1px solid var(--edge); background:var(--panel2); color:var(--txt); cursor:pointer; font-size:13.5px}
  .pickbtn.on{border-color:var(--good); color:var(--good)}
  .line{display:flex; gap:14px; align-items:flex-start; padding:13px 16px; background:var(--panel); border:1px solid var(--edge); border-radius:10px; margin-bottom:10px}
  .line button{flex:none; width:40px; height:40px; border-radius:50%; border:1px solid var(--edge); background:var(--panel2); color:var(--acc); font-size:15px; cursor:pointer}
  .line button:hover{background:#222b36}
  .line button.playing{color:var(--acc2); border-color:var(--acc2)}
  .line .txt{font-size:14.5px; color:var(--txt)}
  .line .src{font-size:11.5px; color:var(--dim); margin-top:3px}
  .line.nofile button{opacity:.25; cursor:default}
  #exp{position:fixed; bottom:18px; right:22px; padding:10px 18px; border-radius:10px; background:var(--acc); color:#161006; font-weight:700; border:0; cursor:pointer; font-size:13.5px}
  .empty{color:var(--dim); margin-top:40px; text-align:center}
  ::-webkit-scrollbar{width:10px} ::-webkit-scrollbar-thumb{background:#2a333e; border-radius:5px}
</style>
</head>
<body>
<div id="side"></div>
<div id="main"><div class="empty">Select a character</div></div>
<button id="exp" title="Copy your voice picks as JSON to paste back to Claude">Copy picks</button>
<script src="data/dms/app_data.js"></script>
<script>
const D = window.APP_DATA || {characters:[]};
const picks = JSON.parse(localStorage.getItem('srr_picks')||'{}');
let curAudio=null, curBtn=null;

function initials(n){ return (n||'?').split(/\s+/).map(w=>w[0]).slice(0,2).join(''); }
function av(c, big){
  const cls = big?'':'';
  if(c.portraitFile) return `<img src="portraits/${c.portraitFile}" alt="">`;
  return `<div class="ph">${initials(c.name)}</div>`;
}
function side(){
  const s=document.getElementById('side');
  const mains=D.characters.filter(c=>c.main), rest=D.characters.filter(c=>!c.main);
  let h='<h2>Main cast — pick a voice</h2>';
  for(const c of mains) h+=chip(c);
  h+='<h2>Cast</h2>';
  for(const c of rest) h+=chip(c);
  s.innerHTML=h;
}
function chip(c){
  const done=picks[c.id]!==undefined?'<span class="st">✓</span>':'';
  return `<div class="char" data-id="${c.id}" onclick="show('${c.id}')">${av(c)}
    <div><div class="nm">${c.name}</div><div class="ct">${c.lineCount} lines${c.main?' · '+c.voices.length+' voice options':''}</div></div>${done}</div>`;
}
function show(id, voiceIdx){
  const c=D.characters.find(x=>x.id===id); if(!c) return;
  document.querySelectorAll('.char').forEach(e=>e.classList.toggle('sel', e.dataset.id===id));
  const m=document.getElementById('main');
  let h=`<div id="hdr">${av(c,1)}<div><h1>${c.name}</h1>
    <div class="meta">${c.lineCount} lines in game${c.archetype?' · '+c.archetype:''}</div></div></div>`;
  if(c.bio) h+=`<div class="note">${c.bio}</div>`;
  const vi = voiceIdx===undefined ? (picks[c.id]!==undefined ? c.voices.findIndex(v=>v.voiceId===picks[c.id]) : 0) : voiceIdx;
  const cur = c.voices[Math.max(vi,0)] || c.voices[0];
  if(c.voices.length>1){
    h+='<div class="vtabs">'+c.voices.map((v,i)=>
      `<div class="vtab ${i===Math.max(vi,0)?'sel':''}" onclick="show('${id}',${i})">${v.voiceName}${picks[c.id]===v.voiceId?'<span class="pick">✓</span>':''}</div>`).join('')+'</div>';
  }
  if(cur){
    h+=`<div class="vmeta">Voice: <b>${cur.voiceName}</b> — ${cur.voiceDesc||''}</div>`;
    const on = picks[c.id]===cur.voiceId;
    h+=`<button class="pickbtn ${on?'on':''}" onclick="pick('${id}',${cur.voiceId},${Math.max(vi,0)})">${on?'✓ Selected for '+c.name:'Use this voice for '+c.name}</button>`;
    for(const s of cur.samples){
      const has=!!s.file;
      h+=`<div class="line ${has?'':'nofile'}">
        <button onclick='play(this,${JSON.stringify(s.file||"")})'>▶</button>
        <div><div class="txt">${esc(s.t)}</div><div class="src">${s.cn||''}</div></div></div>`;
    }
  } else h+='<div class="empty">No samples generated for this character yet — ask Claude.</div>';
  m.innerHTML=h;
}
function pick(id, voiceId, vi){
  if(picks[id]===voiceId) delete picks[id]; else picks[id]=voiceId;
  localStorage.setItem('srr_picks', JSON.stringify(picks));
  side(); show(id, vi);
}
function play(btn, file){
  if(!file) return;
  if(curAudio){ curAudio.pause(); if(curBtn){curBtn.classList.remove('playing'); curBtn.textContent='▶';} }
  if(curBtn===btn){ curAudio=null; curBtn=null; return; }
  curAudio=new Audio('audio/'+file); curBtn=btn;
  btn.classList.add('playing'); btn.textContent='❚❚';
  curAudio.play();
  curAudio.onended=()=>{ btn.classList.remove('playing'); btn.textContent='▶'; curBtn=null; };
}
function esc(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
document.getElementById('exp').onclick=()=>{
  const out={};
  for(const [id,v] of Object.entries(picks)){
    const c=D.characters.find(x=>x.id===id);
    const vv=c&&c.voices.find(x=>x.voiceId===v);
    out[id]={character:c?c.name:id, voiceId:v, voiceName:vv?vv.voiceName:''};
  }
  const txt=JSON.stringify(out,null,1);
  navigator.clipboard.writeText(txt).then(()=>alert('Picks copied — paste them to Claude.'),
    ()=>{ prompt('Copy this:', txt); });
};
side();
if(D.characters.length) show(D.characters[0].id);
</script>
</body>
</html>
